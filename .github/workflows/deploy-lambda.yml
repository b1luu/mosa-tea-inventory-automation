name: Deploy Lambda Functions

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-lambda-functions
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.14"
  RUNTIME313_PYTHON_VERSION: "3.13"
  AWS_REGION: ${{ vars.AWS_REGION }}
  WORKER_LAMBDA_FUNCTION_NAME: ${{ vars.WORKER_LAMBDA_FUNCTION_NAME }}
  LEGACY_LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}
  WEBHOOK_INGRESS_LAMBDA_FUNCTION_NAME: ${{ vars.WEBHOOK_INGRESS_LAMBDA_FUNCTION_NAME }}
  MANUAL_COUNT_SYNC_LAMBDA_FUNCTION_NAME: ${{ vars.MANUAL_COUNT_SYNC_LAMBDA_FUNCTION_NAME }}
  OAUTH_LAMBDA_FUNCTION_NAME: ${{ vars.OAUTH_LAMBDA_FUNCTION_NAME }}
  BINDING_COVERAGE_CHECK_LAMBDA_FUNCTION_NAME: ${{ vars.BINDING_COVERAGE_CHECK_LAMBDA_FUNCTION_NAME }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

jobs:
  deploy:
    name: Deploy From Main
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Require main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::This workflow only deploys from main."
            exit 1
          fi

      - name: Validate deployment configuration
        run: |
          if [ -z "${AWS_REGION}" ]; then
            echo "::error::Set repository variable AWS_REGION before deploying."
            exit 1
          fi

          WORKER_FUNCTION_NAME="${WORKER_LAMBDA_FUNCTION_NAME:-${LEGACY_LAMBDA_FUNCTION_NAME}}"

          if [ -z "${WORKER_FUNCTION_NAME}" ]; then
            echo "::error::Set repository variable WORKER_LAMBDA_FUNCTION_NAME (or legacy LAMBDA_FUNCTION_NAME) before deploying."
            exit 1
          fi

          if [ -z "${AWS_ROLE_TO_ASSUME}" ]; then
            echo "::error::Set repository secret AWS_ROLE_TO_ASSUME before deploying."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run deployment safety checks
        run: |
          python -m compileall app scripts server.py
          python -m unittest discover -s testing -p 'test_*.py'

      - name: Build Lambda deployment packages
        run: |
          rm -rf .build
          build_package () {
            PACKAGE_ROOT="$1"
            PY_VERSION="$2"

            mkdir -p "${PACKAGE_ROOT}/package/data"
            pip install \
              --requirement requirements.txt \
              --platform manylinux2014_x86_64 \
              --implementation cp \
              --python-version "${PY_VERSION}" \
              --only-binary=:all: \
              --target "${PACKAGE_ROOT}/package"
            cp -R app "${PACKAGE_ROOT}/package/app"
            cp data/inventory_item_map.json data/recipe_map.json "${PACKAGE_ROOT}/package/data/"
            find "${PACKAGE_ROOT}/package" -type d -name "__pycache__" -prune -exec rm -rf {} +
            find "${PACKAGE_ROOT}/package" -type f -name "*.pyc" -delete
            (
              cd "${PACKAGE_ROOT}/package"
              zip -r ../lambda-package.zip .
            )
          }

          build_package .build/runtime314 "${PYTHON_VERSION}"
          build_package .build/runtime313 "${RUNTIME313_PYTHON_VERSION}"

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: |
            .build/runtime314/lambda-package.zip
            .build/runtime313/lambda-package.zip
          if-no-files-found: error

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Deploy Lambda package
        run: |
          WORKER_FUNCTION_NAME="${WORKER_LAMBDA_FUNCTION_NAME:-${LEGACY_LAMBDA_FUNCTION_NAME}}"

          deploy_function () {
            FUNCTION_NAME="$1"
            LABEL="$2"
            ZIP_PATH="$3"

            if [ -z "${FUNCTION_NAME}" ]; then
              echo "Skipping ${LABEL}: function name not configured."
              return
            fi

            echo "Deploying ${LABEL}: ${FUNCTION_NAME}"
            aws lambda update-function-code \
              --function-name "${FUNCTION_NAME}" \
              --region "${AWS_REGION}" \
              --zip-file "fileb://${ZIP_PATH}" \
              --publish \
              --query '{FunctionName:FunctionName, Version:Version, LastModified:LastModified, CodeSha256:CodeSha256}'
            aws lambda wait function-updated \
              --function-name "${FUNCTION_NAME}" \
              --region "${AWS_REGION}"
          }

          deploy_function "${WORKER_FUNCTION_NAME}" "worker Lambda" ".build/runtime314/lambda-package.zip"
          deploy_function "${WEBHOOK_INGRESS_LAMBDA_FUNCTION_NAME}" "webhook ingress Lambda" ".build/runtime314/lambda-package.zip"
          deploy_function "${MANUAL_COUNT_SYNC_LAMBDA_FUNCTION_NAME}" "manual count sync Lambda" ".build/runtime314/lambda-package.zip"
          deploy_function "${BINDING_COVERAGE_CHECK_LAMBDA_FUNCTION_NAME}" "binding coverage check Lambda" ".build/runtime313/lambda-package.zip"
          deploy_function "${OAUTH_LAMBDA_FUNCTION_NAME}" "OAuth Lambda" ".build/runtime313/lambda-package.zip"
